<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container py-4">
         <!-- Title -->
        <div class="row mb-4">
            <div class="d-flex align-items-center justify-content-center gap-2" id="title">
                <h3>
                    Recipe Gallery
                    <img src="assets/cooking.png" alt="cooking-icon">
                </h3>
            </div>
        </div>
        <!-- Search area -->
        <div class="row mb-4 position-relative">
            <div class="col-lg-8 mx-auto">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search for recipes" id="search-bar">
                    <button class="btn btn-outline-secondary" id="filter-btn">
                        <i class="bi bi-funnel"></i>
                    </button>
                    <button class="btn btn-outline-dark" id="search-recipes-btn">
                        Search
                    </button>
                </div>
                <div id="filter-dropdown" class="card p-3 position-absolute bg-white shadow" style="display: none; width: 300px; z-index: 1000;">
                    <div id="filter-menu-top">
                        <h4>Filters</h4>
                        <button type="submit" id="save-btn" class="btn">Save</button>
                    </div>

                    <div class="dropdown">
                        <div class="dropdown-arrow-div">
                            <button class="btn btn-secondary" type="button" id="ingr-dropdown-btn">
                                Ingredients
                            </button>
                            <img src="assets/down-arrow.png" alt="down arrow">
                            <!-- https://www.flaticon.com/free-icon/down-arrow_2985150?term=arrow&page=1&position=12&origin=tag&related_id=2985150 -->
                        </div>
                        <ul class="dropdown-menu" id="ingr-list" style="display: none;" aria-labelledby="ingr-dropdown-btn">
                            <li class="filter-option" data-value="ingredient1">Ingredient 1</li>
                            <li class="filter-option" data-value="ingredient2">Ingredient 2</li>
                            <li class="filter-option" data-value="ingredient3">Ingredient 3</li>
                        </ul>
                    </div>

                    <div class="dropdown">
                        <div class="dropdown-arrow-div">
                            <button class="btn btn-secondary" type="button" id="diet-dropdown-btn">
                                Diets
                            </button>
                            <img src="assets/down-arrow.png" alt="down arrow">
                            <!-- https://www.flaticon.com/free-icon/down-arrow_2985150?term=arrow&page=1&position=12&origin=tag&related_id=2985150 -->
                        </div>
                        <ul class="dropdown-menu" id="diet-list" style="display: none;" aria-labelledby="diet-dropdown-btn">
                            <li class="filter-option" data-value="ingredient1">Diet 1</li>
                            <li class="filter-option" data-value="ingredient2">Diet 2</li>
                            <li class="filter-option" data-value="ingredient3">Diet 3</li>
                        </ul>
                    </div>
                    
                </div>
            </div>
        </div>

        <!-- Cards view area -->
        <div class="row g-4" id="recipe-container"></div>
    </div>
    <script src="js/script.js"></script>
</body>
